---
layout: default
---

<h2 style="margin-top: 0;">Posts</h2>
<ul class="post-list" style="list-style: none; padding: 0;">
  {% for post in site.posts %}
  <li style="margin-bottom: 2rem;">
    <a href="{{ post.url }}" style="text-decoration: none;">
      <h3 style="margin: 0; font-size: 1.4rem;">{{ post.title }}</h3>
    </a>
    <span class="date" style="font-family: monospace; font-size: 0.85rem; color: #666;">{{ post.date | date: "%B %d, %Y" }}</span>
    {% if post.categories %}
      <span style="font-size: 0.8rem; color: #888; margin-left: 0.5rem;">[{{ post.categories | join: ", " }}]</span>
    {% endif %}
  </li>
  {% endfor %}
</ul>
